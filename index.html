<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Geografia — 3º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF6FC; --card:#FFFFFF; --ink:#2B3A4A; --muted:#6B7A8C;
    --c1:#F2A519; --c1s:#FDF2D8;
    --c2:#3E8ED0; --c2s:#E3F0FA;
    --c3:#3FA974; --c3s:#E1F4EA;
    --c4:#A45FBF; --c4s:#F3E8F8;
    --c5:#E4506B; --c5s:#FCE7EC;
    --ok:#2E9E5B; --oks:#E2F6E9; --no:#E0762F; --nos:#FDEEDF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:'Nunito',sans-serif; background:var(--bg); color:var(--ink); padding:16px; overflow-x:hidden;}
  .wrap{max-width:760px; margin:0 auto;}
  .tela{display:none; animation:entrar .35s ease;}
  .tela.ativa{display:block;}
  @keyframes entrar{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}

  /* ---------- BOTÃO DE SOM ---------- */
  #btnSom{
    position:fixed; top:14px; right:14px; z-index:70;
    width:44px; height:44px; border-radius:50%; border:none; cursor:pointer;
    background:var(--card); box-shadow:0 4px 14px rgba(43,58,74,.18);
    display:flex; align-items:center; justify-content:center; transition:transform .15s;
  }
  #btnSom:hover{transform:scale(1.08);}
  #btnSom svg{width:22px; height:22px;}

  /* ---------- CABEÇALHO ---------- */
  header{
    background:linear-gradient(135deg,#3E8ED0,#6BB1E3);
    border-radius:22px; padding:26px 22px; color:#fff; text-align:center;
    box-shadow:0 8px 0 rgba(62,142,208,.25); margin-bottom:20px; position:relative; overflow:hidden;
  }
  header::before{content:""; position:absolute; width:170px; height:170px; border-radius:50%;
    background:rgba(255,255,255,.12); top:-70px; right:-50px;}
  header::after{content:""; position:absolute; width:110px; height:110px; border-radius:50%;
    background:rgba(255,255,255,.10); bottom:-50px; left:-30px;}
  header h1{font-family:'Baloo 2',cursive; font-size:clamp(24px,5vw,34px); line-height:1.1;}
  header p{margin-top:6px; font-weight:700; opacity:.95; font-size:14px;}

  /* ---------- ABAS DO MENU ---------- */
  .abas{display:flex; gap:10px; margin-bottom:18px;}
  .aba{
    flex:1; border:3px solid transparent; background:var(--card); border-radius:18px;
    padding:14px 10px; cursor:pointer; text-align:center;
    font-family:'Baloo 2',cursive; font-size:17px; color:var(--muted);
    box-shadow:0 4px 14px rgba(43,58,74,.08); transition:all .18s;
  }
  .aba small{display:block; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; margin-top:2px; color:var(--muted);}
  .aba:hover{transform:translateY(-2px);}
  .aba.ativa{border-color:var(--c2); color:var(--c2); background:var(--c2s);}
  .aba.ativa small{color:var(--c2);}

  /* ---------- MENU ---------- */
  .menu-sub{font-family:'Baloo 2',cursive; font-size:19px; margin:2px 0 14px; text-align:center;}
  .cards{display:grid; gap:14px;}
  .card-tema{
    background:var(--card); border-radius:20px; padding:20px; cursor:pointer;
    display:flex; align-items:center; gap:16px;
    box-shadow:0 4px 14px rgba(43,58,74,.08);
    border:3px solid transparent; transition:transform .18s, border-color .18s, box-shadow .18s;
    text-align:left; width:100%; font-family:inherit; color:inherit;
  }
  .card-tema:hover{transform:translateY(-4px) scale(1.01); box-shadow:0 10px 22px rgba(43,58,74,.14);}
  .card-tema:active{transform:scale(.98);}
  .card-tema .icone{
    width:64px; height:64px; border-radius:18px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .card-tema .icone svg{width:36px; height:36px;}
  .card-tema h3{font-family:'Baloo 2',cursive; font-size:18px; line-height:1.2;}
  .card-tema .desc{font-size:13px; color:var(--muted); font-weight:700; margin-top:3px;}
  .card-tema .melhor{
    margin-top:7px; display:inline-block; font-size:12px; font-weight:800;
    background:#F0F6FB; border-radius:9px; padding:3px 10px; color:var(--c2);
  }
  .t1:hover{border-color:var(--c1);} .t2:hover{border-color:var(--c2);} .t3:hover{border-color:var(--c3);}
  .t4:hover{border-color:var(--c4);} .t5:hover{border-color:var(--c5);}
  .t1 .icone{background:var(--c1s);} .t2 .icone{background:var(--c2s);} .t3 .icone{background:var(--c3s);}
  .t4 .icone{background:var(--c4s);} .t5 .icone{background:var(--c5s);}
  .t5{border-style:dashed; border-color:#F3C2CD;}

  /* ---------- TELA DE ESTUDO ---------- */
  .resumo{
    background:var(--card); border-radius:20px; padding:22px 20px;
    box-shadow:0 4px 14px rgba(43,58,74,.08); border-top:6px solid var(--c2);
    font-size:15px; line-height:1.7; animation:entrar .3s ease;
  }
  .resumo p{font-weight:700; margin-bottom:12px; color:#3A4A5C;}
  .resumo h3{
    font-family:'Baloo 2',cursive; font-size:19px; margin:20px 0 8px;
    display:flex; align-items:center; gap:8px;
  }
  .resumo h3:first-child{margin-top:0;}
  .resumo h3::before{content:""; width:10px; height:10px; border-radius:50%; background:var(--dot,var(--c2)); flex-shrink:0;}
  .mini-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:12px 0 16px;}
  .mini{
    background:#FBFDFF; border:2px solid #E4EDF5; border-radius:14px;
    padding:10px 13px; font-size:13.5px; font-weight:700; line-height:1.45;
  }
  .mini b{font-family:'Baloo 2',cursive; display:block; font-size:15px; margin-bottom:2px;}
  .caixa{
    border-radius:14px; padding:13px 15px; margin:14px 0; font-weight:700;
    border:2px solid #F6C15C; background:var(--c1s); font-size:14px; line-height:1.6;
  }
  .caixa b{font-family:'Baloo 2',cursive;}
  .acoes-estudo{margin:18px 0 6px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .leitura-info{width:100%; text-align:center; font-size:12.5px; font-weight:800; color:var(--muted);}

  /* rapidinhas dentro do resumo */
  .rapidinha{
    background:linear-gradient(135deg,#F7FBFF,#EFF6FC); border:2px dashed #B9D4EA;
    border-radius:16px; padding:13px 15px; margin:14px 0;
  }
  .rapidinha .rap-p{font-family:'Baloo 2',cursive; font-size:15px; margin-bottom:9px; color:var(--c2);}
  .rap-opts{display:flex; gap:8px; flex-wrap:wrap;}
  .rap-opts button{
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px; cursor:pointer;
    border:2px solid #D3E3F0; background:#fff; border-radius:11px; padding:7px 14px;
    color:var(--ink); transition:all .15s;
  }
  .rap-opts button:hover:not(:disabled){border-color:var(--c2); transform:translateY(-2px);}
  .rap-opts button.certo{border-color:var(--ok); background:var(--oks); color:#1F6B3F;}
  .rap-opts button.errado{border-color:var(--no); background:var(--nos); color:#9A4E17;}
  .rap-fb{display:none; margin-top:8px; font-size:13px; font-weight:800;}
  .rap-fb.ok{display:block; color:#1F6B3F;}
  .rap-fb.no{display:block; color:#9A4E17;}

  /* ---------- QUIZ ---------- */
  .topo-quiz{
    background:var(--card); border-radius:16px; padding:12px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    box-shadow:0 4px 14px rgba(43,58,74,.08);
  }
  .btn-voltar{
    border:none; background:#F0F6FB; color:var(--c2); font-family:'Baloo 2',cursive;
    font-size:14px; border-radius:11px; padding:7px 13px; cursor:pointer;
  }
  .btn-voltar:hover{background:#E3F0FA;}
  .tema-nome{font-family:'Baloo 2',cursive; font-size:15px; flex:1; min-width:120px; line-height:1.15;}
  .streak{
    font-family:'Baloo 2',cursive; font-size:15px; color:#E0762F;
    background:var(--nos); border-radius:11px; padding:5px 12px;
    display:none; align-items:center; gap:5px;
  }
  .streak.on{display:flex; animation:pulsar .5s ease;}
  @keyframes pulsar{0%{transform:scale(.6);} 60%{transform:scale(1.2);} 100%{transform:scale(1);}}
  .barra-prog{height:12px; background:#E4EDF5; border-radius:8px; overflow:hidden; width:100%;}
  .barra-prog > div{height:100%; width:0%; border-radius:8px; transition:width .4s;
    background:linear-gradient(90deg,#3FA974,#7BC89B);}
  .contagem{font-size:12.5px; font-weight:800; color:var(--muted); width:100%; text-align:right; margin-top:5px;}

  .q{
    background:var(--card); border-radius:20px; padding:22px 20px;
    box-shadow:0 4px 14px rgba(43,58,74,.08); border-top:6px solid var(--c2);
    animation:entrar .3s ease;
  }
  .q.tremer{animation:tremer .45s ease;}
  @keyframes tremer{
    0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px);}
    40%{transform:translateX(9px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);}
  }
  .q.saltar{animation:saltar .55s ease;}
  @keyframes saltar{
    0%{transform:scale(1);} 35%{transform:scale(1.035);} 60%{transform:scale(.99);} 100%{transform:scale(1);}
  }
  .q .enun{font-weight:800; font-size:16.5px; line-height:1.5; margin-bottom:16px;}
  .q .enun .qn{
    display:inline-block; border-radius:10px; padding:1px 10px; margin-right:7px;
    font-family:'Baloo 2',cursive; font-size:14px; color:#fff; background:var(--c2);
  }
  .opts{display:grid; gap:9px;}
  .opt{
    display:flex; align-items:flex-start; gap:10px; padding:12px 14px;
    border:2px solid #E4EDF5; border-radius:14px; cursor:pointer; transition:all .15s;
    font-weight:700; font-size:14.5px; line-height:1.45; background:#FBFDFF;
  }
  .opt:hover{border-color:#B9D4EA; transform:translateX(3px);}
  .opt input{position:absolute; opacity:0; pointer-events:none;}
  .opt .letra{
    font-family:'Baloo 2',cursive; width:26px; height:26px; border-radius:9px; flex-shrink:0;
    background:#E4EDF5; color:var(--muted); display:flex; align-items:center; justify-content:center;
    font-size:14px; transition:all .15s;
  }
  .opt:focus-within{outline:3px solid #9CC5E6; outline-offset:2px;}
  .opt.sel{border-color:var(--c2); background:var(--c2s);}
  .opt.sel .letra{background:var(--c2); color:#fff;}
  .opt.certa{border-color:var(--ok); background:var(--oks);}
  .opt.certa .letra{background:var(--ok); color:#fff;}
  .opt.errada{border-color:var(--no); background:var(--nos);}
  .opt.errada .letra{background:var(--no); color:#fff;}
  .opt.travada{cursor:default;} .opt.travada:hover{transform:none;}

  .acao{margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;}
  .btn{
    font-family:'Baloo 2',cursive; font-size:16px; color:#fff; border:none; cursor:pointer;
    padding:10px 26px; border-radius:14px; background:linear-gradient(135deg,#3E8ED0,#5CA4DE);
    box-shadow:0 4px 0 rgba(62,142,208,.35); transition:transform .1s;
  }
  .btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(62,142,208,.35);}
  .btn:disabled{background:#C4D3E0; box-shadow:none; cursor:default;}
  .btn.verde{background:linear-gradient(135deg,#3FA974,#6FC397); box-shadow:0 4px 0 rgba(63,169,116,.35);}
  .btn.laranja{background:linear-gradient(135deg,#E0762F,#EE9A5F); box-shadow:0 4px 0 rgba(224,118,47,.35);}

  .feedback{
    display:none; margin-top:14px; border-radius:14px; padding:13px 15px;
    font-size:14px; font-weight:700; line-height:1.55;
  }
  .feedback.ok{display:block; background:var(--oks); color:#1F6B3F; border:2px solid #A9DEBE;}
  .feedback.no{display:block; background:var(--nos); color:#9A4E17; border:2px solid #F3C7A4;}
  .feedback .tit{font-family:'Baloo 2',cursive; font-size:16px; display:block; margin-bottom:3px;}

  .selo{
    position:fixed; left:50%; top:38%; transform:translate(-50%,-50%) scale(0);
    font-family:'Baloo 2',cursive; font-size:clamp(30px,7vw,46px); color:#fff;
    background:linear-gradient(135deg,#3FA974,#6FC397);
    padding:14px 34px; border-radius:22px; z-index:60; pointer-events:none;
    box-shadow:0 10px 30px rgba(63,169,116,.45); opacity:0;
  }
  .selo.mostrar{animation:selo .9s ease forwards;}
  @keyframes selo{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.2) rotate(-8deg);}
    35%{opacity:1; transform:translate(-50%,-50%) scale(1.12) rotate(2deg);}
    55%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    80%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-62%) scale(.95);}
  }

  /* ---------- RESULTADO ---------- */
  .final-card{
    background:var(--card); border-radius:22px; padding:30px 22px; text-align:center;
    box-shadow:0 4px 14px rgba(43,58,74,.09);
  }
  .final-card h2{font-family:'Baloo 2',cursive; font-size:26px;}
  .estrelas{font-size:44px; letter-spacing:6px; margin:12px 0 4px;}
  .estrelas .e{display:inline-block; color:#D8E2EC; transform:scale(0);}
  .estrelas .e.ganha{color:#F2A519; text-shadow:0 3px 0 rgba(242,165,25,.25);}
  .estrelas .e.anim{animation:estrela .5s ease forwards;}
  @keyframes estrela{0%{transform:scale(0) rotate(-30deg);} 60%{transform:scale(1.35) rotate(8deg);} 100%{transform:scale(1) rotate(0);}}
  .nota{font-family:'Baloo 2',cursive; font-size:46px; color:var(--c2); margin:6px 0;}
  .msg-final{font-weight:700; color:var(--muted); max-width:420px; margin:0 auto 6px;}
  .final-acoes{margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}

  canvas#confete{position:fixed; inset:0; pointer-events:none; z-index:50;}
  footer{text-align:center; font-size:12px; color:var(--muted); font-weight:700; padding:20px 0 10px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>
<canvas id="confete"></canvas>
<div class="selo" id="selo">Acertou!</div>
<button id="btnSom" title="Ligar ou desligar o som" aria-label="Ligar ou desligar o som"></button>

<div class="wrap">

<!-- ============ TELA MENU ============ -->
<div class="tela ativa" id="telaMenu">
  <header>
    <h1>Quiz de Geografia</h1>
    <p>3º Ano EFAI &bull; Escolha um assunto para estudar ou praticar</p>
  </header>
  <div class="abas">
    <button class="aba ativa" id="abaEstudo" onclick="trocarModo('estudo')">Estudo Rápido<small>Resumos para aprender o assunto</small></button>
    <button class="aba" id="abaQuiz" onclick="trocarModo('quiz')">Quiz<small>Questões para praticar</small></button>
  </div>
  <div class="menu-sub" id="menuSub">Qual assunto você quer estudar hoje?</div>
  <div class="cards" id="menuCards"></div>
</div>

<!-- ============ TELA ESTUDO ============ -->
<div class="tela" id="telaEstudo">
  <div class="topo-quiz">
    <button class="btn-voltar" onclick="voltarMenu()">&#8592; Menu</button>
    <div class="tema-nome" id="estudoNome"></div>
    <div class="barra-prog"><div id="barraLeitura"></div></div>
    <div class="leitura-info" id="leituraInfo">Leia o resumo até o final para liberar o quiz</div>
  </div>
  <div id="areaResumo"></div>
  <div class="acoes-estudo">
    <button class="btn verde" id="btnQuizEstudo" disabled>Leia até o final para liberar o quiz</button>
  </div>
</div>

<!-- ============ TELA QUIZ ============ -->
<div class="tela" id="telaQuiz">
  <div class="topo-quiz">
    <button class="btn-voltar" onclick="voltarMenu()">&#8592; Menu</button>
    <div class="tema-nome" id="temaNome"></div>
    <div class="streak" id="streak">&#128293; <span id="streakN">0</span> seguidas</div>
    <div class="barra-prog"><div id="barra"></div></div>
    <div class="contagem" id="contagem"></div>
  </div>
  <div id="areaQuestao"></div>
</div>

<!-- ============ TELA FINAL ============ -->
<div class="tela" id="telaFinal">
  <header>
    <h1 id="finalTitulo">Fim do quiz!</h1>
    <p id="finalTema"></p>
  </header>
  <div class="final-card">
    <div class="estrelas" id="estrelas">
      <span class="e">&#9733;</span><span class="e">&#9733;</span><span class="e">&#9733;</span>
    </div>
    <div class="nota" id="notaFinal">0 / 10</div>
    <h2 id="tituloFinal"></h2>
    <p class="msg-final" id="msgFinal"></p>
    <div class="final-acoes" id="finalAcoes"></div>
  </div>
</div>

<footer>Geografia &bull; 3º Ano EFAI &bull; Revisão completa: capítulos 4, 5 e 6</footer>
</div>

<script>
/* ================== ARMAZENAMENTO (com reserva em memória) ================== */
const store = (()=>{
  let mem = {}, ok = false;
  try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true; }catch(e){}
  return {
    get(k){ try{ return ok ? localStorage.getItem(k) : (k in mem ? mem[k] : null); }catch(e){ return k in mem ? mem[k] : null; } },
    set(k,v){ mem[k]=v; try{ if(ok) localStorage.setItem(k,v); }catch(e){} }
  };
})();

/* ================== ÍCONES ================== */
const ICONES = {
  festa:'<svg viewBox="0 0 24 24" fill="none" stroke="#F2A519" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.8 11.3 2 22l10.7-3.8"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.2.7a2 2 0 0 0-1.3 2.5l.1.3a2 2 0 0 1-1.3 2.5L16 8.5"/><path d="m11 13 2.2-2.2a2 2 0 0 1 2.8 0l.6.6"/><path d="m2 2 20 20"/></svg>',
  povos:'<svg viewBox="0 0 24 24" fill="none" stroke="#3E8ED0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  comida:'<svg viewBox="0 0 24 24" fill="none" stroke="#3FA974" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M21.2 8A10 10 0 0 0 14 2.8V8h7.2z"/></svg>',
  musica:'<svg viewBox="0 0 24 24" fill="none" stroke="#A45FBF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
  trofeu:'<svg viewBox="0 0 24 24" fill="none" stroke="#E4506B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>',
  somOn:'<svg viewBox="0 0 24 24" fill="none" stroke="#3E8ED0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>',
  somOff:'<svg viewBox="0 0 24 24" fill="none" stroke="#6B7A8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
};

/* ================== DADOS ================== */
const DADOS = [
{
 titulo:"Manifestações Culturais no Município",
 desc:"Brincadeiras, Carnaval, folclore e futebol", icone:ICONES.festa, classe:"t1", cor:"#F2A519",
 questoes:[
 {p:"O que melhor define uma manifestação cultural?",
  o:["Uma atividade praticada somente por artistas profissionais em teatros",
     "Uma forma de expressar os costumes, as tradições e a identidade de um povo",
     "Um evento organizado apenas pelo governo para atrair turistas",
     "Uma festa realizada uma única vez, sem ligação com a história do lugar"],

/* ================== UTILIDADES ================== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
// cria uma instância da questão com alternativas embaralhadas
function instanciar(q){
  const ordem = shuffle([...q.o.keys()]);
  return { ref:q, p:q.p, o:ordem.map(i=>q.o[i]), c:ordem.indexOf(q.c), e:q.e };
}

let leituraLiberada = false;
function abrirEstudo(i){
  const tema = DADOS[i];
  leituraLiberada = false;
  document.getElementById('estudoNome').textContent = tema.titulo;
  document.getElementById('areaResumo').innerHTML =
    `<div class="resumo" style="border-top-color:${tema.cor}; --dot:${tema.cor}">${RESUMOS[i]}</div>`;

  const btn = document.getElementById('btnQuizEstudo');
  btn.disabled = true;
  btn.textContent = 'Leia até o final para liberar o quiz';
  btn.onclick = ()=>iniciarTema(i);
  document.getElementById('barraLeitura').style.width = '0%';
  document.getElementById('leituraInfo').textContent = 'Leia o resumo até o final para liberar o quiz';

  // liga as rapidinhas
  document.querySelectorAll('#areaResumo .rapidinha').forEach(r=>{
    const c = parseInt(r.dataset.c);
    const btns = [...r.querySelectorAll('.rap-opts button')];
    const fb = r.querySelector('.rap-fb');
    btns.forEach((b,bi)=>{
      b.onclick = ()=>{
        if(r.classList.contains('feita')) return;
        r.classList.add('feita');
        btns.forEach((bb,bj)=>{
          bb.disabled = true;
          if(bj===c) bb.classList.add('certo');
          if(bj===bi && bi!==c) bb.classList.add('errado');
        });
        if(bi===c){
          fb.textContent = 'Isso mesmo!'; fb.className = 'rap-fb ok';
          tocarSom(true, 740);
          const rc = btns[c].getBoundingClientRect();
          celebrar(30, rc.left+rc.width/2, rc.top+rc.height/2, false);
        } else {
          fb.textContent = 'Quase! A certa está em verde.'; fb.className = 'rap-fb no';
          tocarSom(false);
        }
      };
    });
  });

  mostrarTela('telaEstudo');
  setTimeout(atualizarLeitura, 80);
}

function atualizarLeitura(){
  if(!document.getElementById('telaEstudo').classList.contains('ativa')) return;
  const resumo = document.querySelector('#areaResumo .resumo');
  if(!resumo) return;
  const r = resumo.getBoundingClientRect();
  let pct;
  if(r.height <= innerHeight - 80) pct = 100;
  else pct = Math.max(0, Math.min(100, (innerHeight - r.top) / r.height * 100));
  document.getElementById('barraLeitura').style.width = pct + '%';
  if(pct >= 97 && !leituraLiberada){
    leituraLiberada = true;
    const btn = document.getElementById('btnQuizEstudo');
    btn.disabled = false;
    btn.textContent = 'Agora, fazer o quiz deste assunto \u2192';
    document.getElementById('leituraInfo').textContent = 'Leitura completa! O quiz está liberado.';
    tocarSom(true, 880);
  }
}

/* ================== INÍCIO DE SESSÕES DE QUIZ ================== */
function iniciarTema(i){
  const t = DADOS[i];
  sessao = { nome:t.titulo, cor:t.cor, tipo:'tema', temaIdx:i,
             qs: shuffle(t.questoes).map(instanciar), erradas:[] };
  comecarSessao();
}
function iniciarSimulado(){
  let escolhidas = [];
  DADOS.forEach(t=>{ escolhidas = escolhidas.concat(shuffle(t.questoes).slice(0,3)); });
  sessao = { nome:'Simulado Geral', cor:'#E4506B', tipo:'simulado', temaIdx:4,
             qs: shuffle(escolhidas).map(instanciar), erradas:[] };
  comecarSessao();
}
function iniciarErros(refs){
  sessao = { nome:`${sessao.nome} — Revisão dos erros`, cor:sessao.cor, tipo:'erros', temaIdx:null,
             qs: shuffle(refs).map(instanciar), erradas:[] };
  comecarSessao();
}
function comecarSessao(){
  idxQ = 0; acertos = 0; streak = 0;
  document.getElementById('temaNome').textContent = sessao.nome;
  atualizarStreak();
  mostrarTela('telaQuiz');
  renderQuestao();
}

/* ================== QUIZ ================== */
function renderQuestao(){
  const q = sessao.qs[idxQ];
  const total = sessao.qs.length;

  document.getElementById('barra').style.width = (idxQ/total*100) + '%';
  document.getElementById('contagem').textContent = `Questão ${idxQ+1} de ${total} • Acertos: ${acertos}`;

  const area = document.getElementById('areaQuestao');
  area.innerHTML = '';
  const qDiv = document.createElement('div');
  qDiv.className = 'q';
  qDiv.style.borderTopColor = sessao.cor;

  const nomeGrupo = 'q_' + idxQ + '_' + Date.now();
  let optsHtml = '';
  q.o.forEach((op, oi)=>{
    optsHtml += `
      <label class="opt" data-oi="${oi}">
        <input type="radio" name="${nomeGrupo}" value="${oi}">
        <span class="letra">${String.fromCharCode(65+oi)}</span>
        <span>${op}</span>
      </label>`;
  });

  qDiv.innerHTML = `
    <div class="enun"><span class="qn" style="background:${sessao.cor}">${String(idxQ+1).padStart(2,'0')}</span>${q.p}</div>
    <div class="opts">${optsHtml}</div>
    <div class="acao">
      <button class="btn" id="btnVerificar" disabled>Verificar</button>
      <button class="btn verde" id="btnProxima" style="display:none">Próxima &#8594;</button>
    </div>
    <div class="feedback" id="fb"></div>`;
  area.appendChild(qDiv);

  const opts = [...qDiv.querySelectorAll('.opt')];
  const radios = [...qDiv.querySelectorAll('input[type=radio]')];
  const btnV = qDiv.querySelector('#btnVerificar');
  const btnP = qDiv.querySelector('#btnProxima');
  const fb = qDiv.querySelector('#fb');
  let travado = false;

  radios.forEach((rd, oi)=>{
    rd.addEventListener('change', ()=>{
      if(travado) return;
      opts.forEach(o=>o.classList.remove('sel'));
      opts[oi].classList.add('sel');
      btnV.disabled = false;
    });
  });

  btnV.addEventListener('click', ()=>{
    const marcado = radios.find(r=>r.checked);
    if(!marcado || travado) return;
    travado = true;
    const escolha = parseInt(marcado.value);
    const correta = q.c;
    radios.forEach(r=>r.disabled = true);

    opts.forEach((o,oi)=>{
      o.classList.add('travada'); o.classList.remove('sel');
      if(oi===correta) o.classList.add('certa');
      if(oi===escolha && escolha!==correta) o.classList.add('errada');
    });
    btnV.style.display = 'none';

    if(escolha===correta){
      acertos++; streak++;
      qDiv.classList.add('saltar');
      fb.className = 'feedback ok';
      fb.innerHTML = `<span class="tit">${fraseAcerto()}</span>${q.e}`;
      const rc = opts[correta].getBoundingClientRect();
      celebrar(80, rc.left + rc.width/2, rc.top + rc.height/2, true);
      tocarSom(true);
    } else {
      streak = 0;
      sessao.erradas.push(q.ref);
      qDiv.classList.add('tremer');
      fb.className = 'feedback no';
      fb.innerHTML = `<span class="tit">Não foi dessa vez. A correta é a letra ${String.fromCharCode(65+correta)}.</span>${q.e}`;
      tocarSom(false);
    }
    atualizarStreak();
    document.getElementById('contagem').textContent = `Questão ${idxQ+1} de ${sessao.qs.length} • Acertos: ${acertos}`;

    // pequeno atraso para garantir a leitura do feedback
    setTimeout(()=>{
      btnP.style.display = 'inline-block';
      btnP.textContent = (idxQ+1 < sessao.qs.length) ? 'Próxima \u2192' : 'Ver resultado \u2192';
      btnP.focus();
    }, 650);
  });

  btnP.addEventListener('click', ()=>{
    idxQ++;
    if(idxQ < sessao.qs.length) renderQuestao();
    else mostrarFinal();
  });
}

function fraseAcerto(){
  const base = ['Acertou! Muito bem!','Isso mesmo! Excelente!','Perfeito! Continue assim!','Mandou bem!'];
  if(streak>=5) return `Incrível! ${streak} acertos seguidos!`;
  if(streak>=3) return `Que sequência! ${streak} acertos seguidos!`;
  return base[Math.floor(Math.random()*base.length)];
}
function atualizarStreak(){
  const el = document.getElementById('streak');
  document.getElementById('streakN').textContent = streak;
  el.classList.toggle('on', streak>=2);
}

/* ================== FINAL ================== */
function mostrarFinal(){
  const total = sessao.qs.length;
  const errosRefs = sessao.erradas.slice();

  // salva melhor resultado apenas em rodadas completas de tema ou simulado
  if(sessao.tipo!=='erros' && sessao.temaIdx!==null){
    if(melhores[sessao.temaIdx]===null || acertos>melhores[sessao.temaIdx]){
      melhores[sessao.temaIdx] = acertos;
      salvarMelhores();
    }
  }

  document.getElementById('finalTitulo').textContent =
    sessao.tipo==='erros' ? 'Fim da revisão!' : 'Fim do quiz!';
  document.getElementById('finalTema').textContent = sessao.nome;
  document.getElementById('notaFinal').textContent = `${acertos} / ${total}`;

  const pct = acertos/total;
  let titulo, msg, nEstrelas;
  if(pct===1){ titulo='Nota máxima!'; msg='Você acertou todas as questões. Domínio completo do conteúdo!'; nEstrelas=3; }
  else if(pct>=0.8){ titulo='Excelente!'; msg='Ótimo resultado! Revise apenas as questões que errou.'; nEstrelas=3; }
  else if(pct>=0.6){ titulo='Bom trabalho!'; msg='Você está no caminho certo. Releia as explicações e tente de novo.'; nEstrelas=2; }
  else if(pct>=0.4){ titulo='Quase lá!'; msg='Revise o conteúdo e refaça o quiz para melhorar sua nota.'; nEstrelas=1; }
  else { titulo='Vamos revisar?'; msg='Estude o resumo com calma e volte para tentar de novo. Você consegue!'; nEstrelas=0; }

  document.getElementById('tituloFinal').textContent = titulo;
  document.getElementById('msgFinal').textContent = msg;

  // botões de ação do final
  const acoes = document.getElementById('finalAcoes');
  acoes.innerHTML = '';
  if(errosRefs.length > 0){
    const b = document.createElement('button');
    b.className = 'btn laranja';
    b.textContent = `Refazer só as que errei (${errosRefs.length})`;
    b.onclick = ()=>iniciarErros(errosRefs);
    acoes.appendChild(b);
  }
  const bRef = document.createElement('button');
  bRef.className = 'btn';
  if(sessao.tipo==='simulado'){
    bRef.textContent = 'Novo simulado';
    bRef.onclick = iniciarSimulado;
  } else if(sessao.tipo==='erros'){
    bRef.textContent = 'Refazer a revisão';
    const refs = sessao.qs.map(q=>q.ref);
    bRef.onclick = ()=>iniciarErros(refs);
  } else {
    bRef.textContent = 'Refazer este conteúdo';
    const ti = sessao.temaIdx;
    bRef.onclick = ()=>iniciarTema(ti);
  }
  acoes.appendChild(bRef);
  const bMenu = document.createElement('button');
  bMenu.className = 'btn verde';
  bMenu.textContent = 'Escolher outro conteúdo';
  bMenu.onclick = voltarMenu;
  acoes.appendChild(bMenu);

  const estrelas = [...document.querySelectorAll('#estrelas .e')];
  estrelas.forEach(e=>{ e.classList.remove('ganha','anim'); e.style.transform='scale(0)'; });
  mostrarTela('telaFinal');

  estrelas.forEach((e,i)=>{
    setTimeout(()=>{
      e.style.transform='';
      if(i<nEstrelas) e.classList.add('ganha');
      e.classList.add('anim');
      if(i<nEstrelas) tocarSom(true, 660 + i*160);
    }, 350 + i*350);
  });
  if(pct>=0.8) setTimeout(()=>celebrar(140, innerWidth/2, innerHeight*0.35, false), 500);
}

/* ================== EFEITOS: CONFETE ================== */
const cv = document.getElementById('confete');
const ctx = cv.getContext('2d');
let parts = [], animando = false;
function ajustarCanvas(){ cv.width = innerWidth; cv.height = innerHeight; }
addEventListener('resize', ajustarCanvas); ajustarCanvas();

const CORES = ['#F2A519','#3E8ED0','#3FA974','#E0762F','#A45FBF','#E4506B'];
function celebrar(n, x, y, comSelo){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  x = (typeof x==='number') ? x : innerWidth/2;
  y = (typeof y==='number') ? y : innerHeight*0.35;
  if(comSelo){
    const selo = document.getElementById('selo');
    selo.classList.remove('mostrar'); void selo.offsetWidth;
    selo.textContent = streak>=3 ? `${streak} seguidas!` : 'Acertou!';
    selo.classList.add('mostrar');
  }
  for(let i=0;i<n;i++){
    parts.push({
      x: x + (Math.random()-.5)*120,
      y: y,
      vx:(Math.random()-.5)*11,
      vy:-(Math.random()*9+5),
      g:.28+Math.random()*.12,
      w:6+Math.random()*7, h:9+Math.random()*8,
      cor:CORES[Math.floor(Math.random()*CORES.length)],
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.3,
      vida:90+Math.random()*50
    });
  }
  if(!animando){ animando=true; requestAnimationFrame(loopConfete); }
}
function loopConfete(){
  ctx.clearRect(0,0,cv.width,cv.height);
  parts = parts.filter(p=>p.vida>0 && p.y<cv.height+40);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.99; p.rot+=p.vr; p.vida--;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha = Math.min(1, p.vida/40);
    ctx.fillStyle = p.cor;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  if(parts.length){ requestAnimationFrame(loopConfete); }
  else { animando=false; ctx.clearRect(0,0,cv.width,cv.height); }
}

/* ================== EFEITOS: SOM ================== */
let audioCtx = null;
function tocarSom(acertou, freqBase){
  if(!somAtivo) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    if(acertou){
      const notas = freqBase ? [freqBase] : [523.25, 659.25, 783.99]; // dó-mi-sol
      notas.forEach((f,i)=>{
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type='triangle'; o.frequency.value=f;
        g.gain.setValueAtTime(0.0001, t+i*0.09);
        g.gain.exponentialRampToValueAtTime(0.18, t+i*0.09+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t+i*0.09+0.35);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t+i*0.09); o.stop(t+i*0.09+0.4);
      });
    } else {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(220,t);
      o.frequency.exponentialRampToValueAtTime(150, t+0.25);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.12,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+0.32);
    }
  }catch(e){/* som indisponível */}
}
